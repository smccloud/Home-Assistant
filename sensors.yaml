
- platform: mqtt
  name: boysroomtemp
  state_topic: "tele/boysroom/SENSOR"
  value_template: "{{ value_json['AM2301'].Temperature }}"
  unit_of_measurement: "°F"
- platform: mqtt
  name: boysroomhumidity
  state_topic: "tele/boysroom/SENSOR"
  value_template: "{{ value_json['AM2301'].Humidity }}"
  unit_of_measurement: "%"
- platform: time_date
  display_options:
    - 'time'
    - 'date'
    - 'date_time'
    - 'time_date'
    - 'time_utc'
    - 'beat'
- platform: uptime
  unit_of_measurement: hours
- platform: cert_expiry
  host: !secret cert_url
  port: 443
- platform: template
  sensors:
    living_room_temp:
      friendly_name: "Living room temperature"
      unit_of_measurement: "°F"
      value_template: "{{ states.climate.sensi.attributes.current_temperature }}"
    living_room_humidity:
      friendly_name: "Living room humidity"
      unit_of_measurement: "%"
      value_template: "{{ states.climate.sensi.attributes.current_humidity|round }}"
    hvac_mode:
      friendly_name: "HVAC Mode"
      value_template: "{{ states.climate.sensi.attributes.hvac_action }}"
- platform: ring
- platform: openweathermap
  api_key: !secret openweathermap_api_key
  monitored_conditions:
    - weather
    - temperature
    - wind_speed
    - wind_bearing
    - humidity
    - pressure
    - clouds
    - rain
    - snow
    - weather_code
- platform: influxdb
  username: !secret influxdb_user
  password: !secret influxdb_pass
  host: !secret influxdb_host
  queries:
    - name: Crawlspace Humidity
      where: '"location" = ''crawlspace'''
      group_function: last
      measurement: '"rpi-dht22"'
      database: !secret influxdb_sensor_db1
      field: humidity
      unit_of_measurement: "%"
      value_template: "{{ value | round(1)  }}"
    - name: Crawlspace Temperature
      where: '"location" = ''crawlspace'''
      group_function: last
      measurement: '"rpi-dht22"'
      database: !secret influxdb_sensor_db1
      field: temperature
      unit_of_measurement: "°F"
      value_template: "{{ value | round(1)  }}"
    - name: Server CPU Temperature
      where: '"host" = ''BB-8'' AND "chip" = ''k10temp-pci-00c3'''
      group_function: last
      database: !secret influxdb_sensor_db2
      field: temp_input
      unit_of_measurement: "ºC"
      measurement: '"sensors"'
      value_template: "{{ value | round(1)  }}"
