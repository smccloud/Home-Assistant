- platform: mqtt
  name: boysroomtemp
  state_topic: "tele/boysroom/SENSOR"
  value_template: "{{ value_json['AM2301'].Temperature }}"
  unit_of_measurement: "°F"
- platform: mqtt
  name: boysroomhumidity
  state_topic: "tele/boysroom/SENSOR"
  value_template: "{{ value_json['AM2301'].Humidity }}"
  unit_of_measurement: "%"
- platform: time_date
  display_options:
    - 'time'
    - 'date'
    - 'date_time'
    - 'time_date'
    - 'time_utc'
    - 'beat'
- platform: uptime
  unit_of_measurement: hours
- platform: cert_expiry
  host: !secret cert_url
  port: 443
- platform: template
  sensors:
    living_room_temp:
      friendly_name: "Living room temperature"
      unit_of_measurement: "°F"
      value_template: "{{ states.climate.sensi.attributes.current_temperature }}"
    living_room_humidity:
      friendly_name: "Living room humidity"
      unit_of_measurement: "%"
      value_template: "{{ states.climate.sensi.attributes.current_humidity|round }}"
- platform: command_line
  name: CPU_Temperature
  command: "cat /sys/class/thermal/thermal_zone0/temp"
  # If errors occur, remove degree symbol below
  unit_of_measurement: "°C"
  value_template: '{{ value | multiply(0.001) | round(1) }}'
- platform: ring
- platform: openweathermap
  api_key: !secret openweathermap_api_key
  monitored_conditions:
    - weather
    - temperature
    - wind_speed
    - wind_bearing
    - humidity
    - pressure
    - clouds
    - rain
    - snow
    - weather_code
