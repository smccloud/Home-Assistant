homeassistant:
  auth_providers:
    - type: homeassistant
  name: Home
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  elevation: !secret home_elevation
  unit_system: imperial
  time_zone: America/Chicago
  customize: !include customize.yaml
  packages: !include_dir_named packages

frontend:

config:

http:

updater:
  include_used_components: true

discovery:

mobile_app:

conversation:

map:

sun:

sensor: !include sensors.yaml

tts:
  - platform: google_translate
    service_name: google_say

cloud:

group: !include groups.yaml
automation: !include_dir_list automations/
script: !include_dir_list scripts/

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_pass

wemo:
  static:
    - !secret heidinightstandip

zone:
  name: Home
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  radius: 4500
  icon: mdi:home

notify: !include notifications.yaml

homekit:
  auto_start: False

switch: !include switches.yaml

zeroconf:

camera: !include cameras.yaml

light:
  - platform: group
    name: Boy's Room
    entities:
      - light.hue_white_lamp_1
      - light.hue_white_lamp_2

logger:
  default: error

climate:

recorder:
  purge_keep_days: 90
  db_url: !secret recorder_url

history:

tplink:
  switch:
    - host: !secret shaun_nightstand_ip

system_health:

ffmpeg:

api:

input_datetime:
  climate_night:
    has_time: true
  climate_morning:
    has_time: true

input_number:
  ac_set_point_home_day:
    name: "AC Set Point Home Day"
    mode: box
    initial: 73
    min: 60
    max: 80
    step: 1
  ac_set_point_away_day:
    name: "AC Set Point Away Day"
    mode: box
    initial: 76
    min: 60
    max: 80
    step: 1
  ac_set_point_home_night:
    name: "AC Set Point Home Night"
    mode: box
    initial: 75
    min: 60
    max: 80
    step: 1
  ac_set_point_away_night:
    name: "AC Set Point Away Night"
    mode: box
    initial: 78
    min: 60
    max: 80
    step: 1
  heat_set_point_home_day:
    name: "Heat Set Point Home Day"
    mode: box
    initial: 71
    min: 60
    max: 80
    step: 1
  heat_set_point_away_day:
    name: "Heat Set Point Away Day"
    mode: box
    initial: 68
    min: 60
    max: 80
    step: 1
  heat_set_point_home_night:
    name: "Heat Set Point Home Night"
    mode: box
    initial: 69
    min: 60
    max: 80
    step: 1
  heat_set_point_away_night:
    name: "Heat Set Point Away Night"
    mode: box
    initial: 66
    min: 60
    max: 80
    step: 1
  auto_low_set_point_home_day:
    name: "Auto Low Set Point Home Day"
    mode: box
    initial: 71
    min: 60
    max: 80
    step: 1
  auto_low_set_point_away_day:
    name: "Auto Low Set Point Away Day"
    mode: box
    initial: 68
    min: 60
    max: 80
    step: 1
  auto_high_set_point_home_day:
    name: "Auto High Set Point Home Day"
    mode: box
