homeassistant:
  auth_providers:
    - type: homeassistant
  name: Home
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  elevation: !secret home_elevation
  unit_system: us_customary
  time_zone: America/Chicago
  customize: !include customize.yaml
  packages: !include_dir_named packages
  currency: USD
  country: US

frontend:

config:

http:
   use_x_forwarded_for: true
   trusted_proxies:
     - 172.16.0.0/12
     - 173.245.48.0/20
     - 103.21.244.0/22
     - 103.22.200.0/22
     - 103.31.4.0/22
     - 141.101.64.0/18
     - 108.162.192.0/18
     - 190.93.240.0/20
     - 188.114.96.0/20
     - 197.234.240.0/22
     - 198.41.128.0/17
     - 162.158.0.0/15
     - 104.16.0.0/13
     - 104.24.0.0/14
     - 172.64.0.0/13
     - 131.0.72.0/22
mobile_app:

conversation:

sun:

recorder:
  purge_keep_days: 14
  auto_purge : true
  auto_repack: true

sensor: !include sensors.yaml

cloud:

group: !include groups.yaml
automation: !include_dir_list automations/
script: !include_dir_list scripts/

mqtt:
  sensor:
    - name: boysroomtemp
      state_topic: "tele/boysroom/SENSOR"
      value_template: "{{ value_json['AM2301'].Temperature }}"
      unit_of_measurement: "°F"
    - name: boysroomhumidity
      state_topic: "tele/boysroom/SENSOR"
      value_template: "{{ value_json['AM2301'].Humidity }}"
      unit_of_measurement: "%"
    - name: mechanicalroomtemp
      state_topic: "mechanicalroom/temperature"
      unit_of_measurement: "°F"
    - name: mechanicalroomhumidity
      state_topic: "mechanicalroom/humidity"
      unit_of_measurement: "%"
    - name: garagetempf
      state_topic: "garage/temperature_f"
      unit_of_measurement: "°F"
    - name: garagetempc
      state_topic: "garage/temperature_c"
      unit_of_measurement: "°C"
    - name: garagehumidity
      state_topic: "garage/humidity"
      unit_of_measurement: "%"
  switch:
    - name: boys_lamp
      state_topic: "stat/boysroom/POWER"
      command_topic: "cmnd/boysroom/POWER"
      availability_topic: "tele/boysroom/LWT"
      qos: 1
      payload_on: "ON"
      payload_off: "OFF"
      payload_available: "Online"
      payload_not_available: "Offline"
      retain: true


zone:
  name: Home
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  radius: 4500
  icon: mdi:home

notify: !include notifications.yaml

switch: !include switches.yaml

zeroconf:

camera: !include cameras.yaml

light:
  - platform: group
    name: Boy's Room
    entities:
      - light.hue_white_lamp_1
      - light.hue_white_lamp_2

logger:
  default: error

climate:

history:

