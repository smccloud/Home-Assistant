alias: CT101 Heat Set Morning
initial_state: True
trigger:
  platform: time
  at: '07:30:00'
condition:
  - condition: state
    entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
    state: heat
action:
  - service: climate.set_temperature
    data_template:
      data: >
        {% if is_state('group.thermostatdevices', 'home') %}
          entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
          temperature: "{{ states('input_number.heat_set_point_home_day') }}"
        {% elif is_state('group.thermostatdevices', 'not_home') %}
          entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
          temperature: "{{ states('input_number.heat_set_point_away_day') }}"
        {% else %}
          entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
          temperature: "{{ states('input_number.heat_set_point_home_day') }}"
        {% endif %}
  - service: notify.mobile_app_Shaun_iPhone
    data:
      title: "Morning"
      message: "Raising heat for the day"
