alias: CT101 Auto Set Night
initial_state: True
trigger:
  platform: time
  at: '22:00:00'
condition:
  - condition: state
    entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
    state: heat_cool
action:
  - service: climate.set_temperature
    data_template:
      entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
      temperature: >-
        {{ state_attr('climate.radio_thermostat_company_of_america_ct101_thermostat_mode', 'target_temp_low')|int(71) - 2 }}
  - service: climate.set_temperature
    data_template:
      entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
      target_temp_high: >-
        {{ state_attr('climate.radio_thermostat_company_of_america_ct101_thermostat_mode', 'target_temp_high')|int(73) + 2 }}
