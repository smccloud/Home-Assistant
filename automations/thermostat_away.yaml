alias: Temp Set Away
initial_state: True
trigger:
  - platform: state
    entity_id: group.thermostatdevices
    from: 'home'
    to: 'not_home'
action:
  - service: climate.set_temperature
    data_template:
      temperature: >-
        {% if is_state_attr('climate.sensi', 'operation_mode', 'heat') %}
          {{ state_attr('climate.sensi', 'temperature')|int(68) - 3 }}
        {% elif is_state_attr('climate.sensi', 'operation_mode', 'cool') %}
          {{ state_attr('climate.sensi', 'temperature')|int(76) + 3 }}
        {% elif is_state_attr('climate.sensi', 'operation_mode', 'auto') %}
          {{ state_attr('climate.sensi', 'temperature')|int(72) + 3 }}
        {% else %}
          {{ state_attr('climate.sensi', 'temperature') }}
        {% endif %}
      target_temp_low: >-
        # if mode is auto, set to target_temp_low minus 3, else target_temp_low
      target_temp_high: >-
        # if mode is auto, set to target_temp_high plus 3, else target_temp_high
  - service: notify.pushbullet
    data:
      title: 'Thermostat set temp changed due to devices leaving home'
      message: ''
