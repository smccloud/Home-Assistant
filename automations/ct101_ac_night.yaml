alias: CT101 AC Set Night
initial_state: True
trigger:
  platform: time
  at: '22:00:00'
condition:
  - condition: state
    entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
    state: cool
action:
  - service: climate.set_temperature
    data_template:
      entity_id: climate.radio_thermostat_company_of_america_ct101_thermostat_mode
      temperature: >
        {% if is_state('group.thermostatdevices', 'home') %}
          {{ states('input_number.ac_set_point_home_night') }}
        {% else %}
          {{ states('input_number.ac_set_point_away_night') }}
        {% endif %}
  - service: notify.mobile_app_Shaun_iPhone
    data:
      title: "Nighttime"
      message: "Raising temp for night time"
